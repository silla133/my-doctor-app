<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Doctor - Login</title>

<style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background: url('background.jpg') no-repeat center center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* طبقة شفافة لتبهت الصورة */
    .overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(88, 139, 234, 0.571);
        top: 0;
        left: 0;
        z-index: 1;
    }

    .container {
        position: relative;
        z-index: 2;
        width: 90%;
        max-width: 380px;
        text-align: center;
    }

    /* SIGN UP و LOG IN  */
    .top-bar {
        display: flex;
        justify-content: space-between;
        color: rgb(253, 254, 255);
        font-weight: bold;
        font-size: 60px;
        margin-bottom: 49px;
    }


.top-bar {
    display: flex;
    justify-content: center;
    gap: 100px;
    margin-bottom: 10px;
}

/* شكل المربعات */
.tab {
    padding: 8px 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.5);
    color: rgb(16, 40, 62);
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

/* عند المرور بالماوس */
.tab:hover {
    background: #ff3b3b;
}

/* التبويب النشط */
.tab.active {
    background: #bcd0ec;
}



    /* القلب الصغير */
    .heart-wrapper {
        position: relative;
        width: 59px;
        height: 120px;
        margin: auto;
    }

    .heart {
        position: absolute;
        width: 50px;
        height: 50px;
        background: rgb(255, 255, 255);
        transform: rotate(-45deg);
        margin-top: 60px;
        box-shadow: 0 10px 15px rgba(102,151,204,0.5);
    }

    .heart::before, .heart::after {
        content: "";
        position: absolute;
        width: 50px;
        height: 50px;
        background: white;
        border-radius: 50%;
    }

    .heart::before { top: -25px; left: 0; }
    .heart::after { left: 25px; top: 0; }

    /* اسم التطبيق */
    .app-name {
        color: white;
        font-size: 26px;
        margin: 15px 0 25px;
        letter-spacing: 3px;
    }

    /* الحقول */
input {
    width: 70%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ff3b3b;
    border-radius: 6px;
    background: rgba(255,255,255,0.85);
    font-size: 16px;
    color: #ff3b3b;

    direction: ltr;       /* يجعل الكتابة من اليسار */
    text-align: left;     /* يجعل النص يبدأ من اليسار */
} 

    /* زر الدخول */
    .login-btn {
        width: 50%;
        padding: 15px;
        margin-top: 15px;
        border: none;
        border-radius: 25px;
        background: #ff3b3b;
        color: white;
        font-size: 20Spx;
        font-weight: bold;
        cursor: pointer;
    }

    /* نسيت كلمة المرور */
    .forget {
        margin-top: 10px;
        font-size: 15px;
        color: white;
        opacity: 0.8;
    }
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

  <div class="top-bar">
        <div class="tab">SIGN UP</div>
    <div class="tab active">LOG IN</div>

</div>
    <div class="heart-wrapper">
        <div class="heart"></div>
    </div>

    <div class="app-name">MY DOCTOR</div>

    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">

   <button class="login-btn" onclick="goToHome()">LOG IN</button>
    <div class="forget">? Forget Password</div>

</div>

</body>
</html>

<script>
function goToHome() {
    let email = document.querySelector('input[type="email"]').value;

    // نأخذ الاسم قبل @
    let name = email.split("@")[0];

    // نمرره في الرابط
    window.location.href = "home.html?name=" + name;
}
</script>
