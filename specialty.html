<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    text-align: left;
}

/* الهيدر */
.header {
    padding: 37px;
    font-size: 37px;
    font-weight: bold;
    color: #031022;
}

/* شريط البحث */
.search-bar {
    margin: 10px 15px;
    display: flex;
}

.search-bar input {
    flex: 1;
    padding: 8px 12px;
    border-radius: 12px;
    border: 1px solid #ccc;
}

/* قائمة الأطباء */
.doctors-list {
    margin: 15px;
}

/* بطاقة الطبيب */
.doctor {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 10px 0;
    background: #ffffff;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.doctor:hover {
    transform: translateY(-5px) scale(1.01);
    box-shadow: 0 10px 20px rgba(0,0,0,0.25);
}

.doctor img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    margin-right: 10px;
}

.doctor-info {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.doctor-name {
    font-weight: bold;
    font-size: 16px;
    color: #333;
}

.doctor-place,
.doctor-time {
    font-size: 14px;
    color: #777;
}

.doctor-phone a {
    text-decoration: none;
    color: #1d8713;
}
</style>
</head>

/* ===== تحديد نوع التخصص من الرابط ===== */

const type = params.get("type") || "gyneco"; // افتراضي gyneco
const doctors = data[type] || [];

document.getElementById("headerTitle").innerText = type.toUpperCase();

/* ===== دالة عرض الأطباء ===== */
function displayDoctors(filter="") {
    const listEl = document.getElementById("doctorsList");
    listEl.innerHTML = "";
    doctors
        .filter(doc => doc.name.toLowerCase().includes(filter.toLowerCase()))
        .forEach(doc => {
            const div = document.createElement("div");
            div.classList.add("doctor");
            div.innerHTML = `
                <img src="${doc.img}" alt="${doc.name}">
                <div class="doctor-info">
                    <div class="doctor-name">${doc.name}</div>
                    <div class="doctor-place">📍 ${doc.place}</div>
                    <div class="doctor-time">🕒 ${doc.time}</div>
                    <div class="doctor-phone">📞 <a href="tel:${doc.phone}">${doc.phone}</a></div>
                </div>
            `;
            listEl.appendChild(div);
        });
}

/* عرض الأطباء لأول مرة */

/* البحث الحي */
document.getElementById("searchInput").addEventListener("input", e => {
